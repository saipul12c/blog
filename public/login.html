<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - BlogApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/global.css">
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white/5 border border-white/10 rounded-[2.5rem] p-12 glass-dark reveal">
        <div class="text-center mb-10">
            <div class="w-16 h-16 gradient-bg rounded-2xl flex items-center justify-center text-white text-2xl mx-auto mb-6 shadow-lg shadow-primary/20">
                <i class="fas fa-lock"></i>
            </div>
            <h1 class="text-3xl font-black mb-2">Admin Panel</h1>
            <p class="text-slate-400">Silakan masuk untuk mengelola konten</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-400 mb-2 ml-1 uppercase tracking-widest">Username</label>
                <input type="text" id="username" required class="w-full bg-white/10 border border-white/20 rounded-2xl px-6 py-4 outline-none focus:border-primary transition font-medium" placeholder="admin">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-400 mb-2 ml-1 uppercase tracking-widest">Password</label>
                <input type="password" id="password" required class="w-full bg-white/10 border border-white/20 rounded-2xl px-6 py-4 outline-none focus:border-primary transition font-medium" placeholder="••••••••">
            </div>
            <div id="error-msg" class="text-red-400 text-sm font-bold hidden text-center bg-red-400/10 py-3 rounded-xl border border-red-400/20"></div>
            <button type="submit" class="w-full btn-primary py-4 text-lg">
                Masuk Sekarang <i class="fas fa-sign-in-alt ml-2"></i>
            </button>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();
                if (result.success) {
                    localStorage.setItem('adminToken', result.token);
                    window.location.href = '/'; // Redirect to home or admin dashboard
                } else {
                    errorMsg.textContent = result.error;
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.textContent = 'Gagal menghubungkan ke server';
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
